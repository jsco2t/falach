[toolchain]
channel = "1.95.0"
components = ["rustfmt", "clippy"]
profile = "minimal"
# Phase 0 desktop targets (per CLAUDE.md §"Target platforms"). Linux is
# the default host; macOS targets are declared so `make check-macos`
# can type-check the platform-gated `os_events/macos.rs` module
# (Phase 5 T5.2) from a Linux build host. This is a Level-1 gate —
# `cargo check` only; no link, no SDK required. See Makefile
# `check-macos` for the invocation.
#
# Flutter app mobile targets (D2 iOS + D3 Android). These enable
# `make check-feature-gates` to `cargo check` falach-api for
# mobile triples; actual linking requires the iOS SDK / Android NDK.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "aarch64-apple-ios",
    "aarch64-apple-ios-sim",
    "aarch64-linux-android",
    "x86_64-linux-android",
]
